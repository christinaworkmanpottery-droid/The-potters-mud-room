<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1080px; height: 1080px; overflow: hidden; }
.container {
  width: 1080px; height: 1080px;
  background: linear-gradient(160deg, #3E2723 0%, #5C1F04 30%, #C1440E 70%, #D4621A 100%);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 80px 80px 50px;
  position: relative;
  text-align: center;
}
.container::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 50%, rgba(255,248,240,0.05) 0%, transparent 70%);
  pointer-events: none;
}
.emoji-top {
  font-size: 80px; margin-bottom: 30px; z-index: 1;
}
.quote {
  font-family: Georgia, serif; font-size: 54px; color: #FFF8F0;
  line-height: 1.3; z-index: 1; margin-bottom: 40px;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  max-width: 880px;
}
.quote em {
  font-style: italic; color: rgba(255,248,240,0.7);
  font-size: 36px; display: block; margin-top: 24px;
}
.divider {
  width: 120px; height: 3px; background: rgba(255,248,240,0.3);
  margin: 0 auto 30px; z-index: 1; border-radius: 2px;
}
.subtext {
  font-family: Arial, sans-serif; font-size: 26px; color: rgba(255,248,240,0.6);
  z-index: 1; margin-bottom: 50px; line-height: 1.4;
}
.footer {
  text-align: center; z-index: 1;
  border-top: 2px solid rgba(255,248,240,0.2); padding-top: 18px;
  width: 100%; position: absolute; bottom: 40px; left: 0; right: 0;
}
.brand {
  font-family: Georgia, serif; font-size: 24px; color: #FFF8F0;
  letter-spacing: 4px; font-weight: bold;
}
.handle {
  font-family: Arial, sans-serif; font-size: 18px; color: rgba(255,248,240,0.6);
  margin-top: 4px;
}
</style>
</head><body>
<div class="container">
  <div class="emoji-top">🏺</div>
  <div class="quote">
    My therapist charges $200/hr.
    <br>My kiln charges $5 in electricity.
    <br><br>The kiln never judges me.
    <em>— every potter, ever</em>
  </div>
  <div class="divider"></div>
  <div class="subtext">Clay doesn't talk back. It just listens.</div>
  <div class="footer">
    <div class="brand">THE POTTER'S MUD ROOM</div>
    <div class="handle">@thepottersmudroom</div>
  </div>
</div>
</body></html>
